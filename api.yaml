Job:
  - path: /[id]/complete
    verb: POST
    method: completeJob
    summary: Mark job as completed
    input: CompleteJobDTO
    output: Job
    role: AGENT_JOB_OWNER

  - path: /[id]/fail
    verb: POST
    method: failJob
    summary: Mark job as failed
    input: FailJobDTO
    output: Job
    role: AGENT_JOB_OWNER

  - path: /[id]/cancel
    verb: POST
    method: cancelJob
    summary: Cancel a job
    input: CancelJobDTO
    output: Job
    role: AGENT_JOB_OWNER

  - path: /[id]/progress
    verb: POST
    method: updateProgress
    summary: Update job progress
    input: UpdateProgressDTO
    output: none
    role: AGENT_JOB_OWNER

Orchestrator:
  - path: /poll
    verb: POST
    method: pollJobs
    summary: Poll for pending jobs based on capabilities
    input: PollJobsDTO
    output: Job[]
    role: AGENT_JOB_OWNER

  - path: /check-stale
    verb: POST
    method: checkStaleAgents
    summary: Check for and handle stale agents
    input: none
    output: none
    role: AGENT_ADMIN

Agent:
  - path: /register
    verb: POST
    method: registerAgent
    summary: Register or update an agent
    input: RegisterAgentDTO
    output: Agent
    role: public

  - path: /[id]/heartbeat
    verb: POST
    method: heartbeat
    summary: Update agent heartbeat
    input: HeartbeatDTO
    output: none
    role: public

Metrics:
  - path: /jobs
    verb: GET
    method: getJobMetrics
    summary: Get job metrics
    input: none
    output: JobMetrics
    role: AGENT_ADMIN

  - path: /agents
    verb: GET
    method: getAgentMetrics
    summary: Get agent metrics
    input: none
    output: AgentMetrics
    role: AGENT_ADMIN
